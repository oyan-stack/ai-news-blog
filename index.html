<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News for Web Engineers</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px;
      background: #f9f9f7;
      color: #1a1a18;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .meta-bar { font-size: 12px; color: #888; margin-bottom: 32px; }
    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #444;
      border-left: 3px solid #4a90d9;
      padding-left: 10px;
      margin-top: 36px;
      margin-bottom: 12px;
    }
    .news-list { list-style: none; padding: 0; margin: 0; }
    .news-item { padding: 12px 0; border-bottom: 1px solid #e8e8e4; }
    .item-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 2px; }
    .item-header a {
      font-size: 14px;
      font-weight: 500;
      color: #1a6bbf;
      text-decoration: none;
      flex: 1;
    }
    .item-header a:hover { text-decoration: underline; }
    .badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 8px;
      white-space: nowrap;
      margin-top: 2px;
    }
    .meta { font-size: 11px; color: #999; display: block; margin-bottom: 4px; }
    .summary { font-size: 13px; color: #555; margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>AI News for Web Engineers</h1>
  <p class="meta-bar">最終更新: 2026-03-27 01:31 UTC &nbsp;·&nbsp; 0件</p>
  
</body>
</html>
